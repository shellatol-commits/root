<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShellGears Hub</title>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f7fb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.blue-button {
    background: linear-gradient(135deg, #1e90ff, #0066ff);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px 36px;
    font-size: 18px;
    font-weight: 600;
    font-family: "Segoe UI", Arial, sans-serif;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 6px 15px rgba(0, 102, 255, 0.3);
}

.blue-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0, 102, 255, 0.4);
    background: linear-gradient(135deg, #2ea1ff, #0a5cff);
}

.blue-button:active {
    transform: translateY(1px);
    box-shadow: 0 4px 10px rgba(0, 102, 255, 0.25);
}
</style>

</head>
<body>
  <h1>ShellGears Hub</h1>
<button class="blue-button" onclick="travel1()">Old Datapack Site</button>
  <p>
  <button class="blue-button" onclick="travel2()">Main Site</button>
  <p>
<button class="blue-button" onclick="travel3()">Modrinth (Me)</button>
  <p>
  <button class="blue-button" onclick="travel4()">Modrinth (Gears)</button>
</body>
  <script src="travel.js"></script>
</html>
